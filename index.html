    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --text: #e8e4de;
            --muted: #4a4a4a;
            --border: #1a1a1a;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            padding: 2rem 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border);
        }

        .site-name {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        .site-role {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            font-style: italic;
        }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .card {
            position: relative;
            background: var(--bg);
            overflow: hidden;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .card-thumb {
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            background: #111;
        }

        /* YouTube thumbnail */
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease, opacity 0.3s;
            opacity: 0.8;
        }
        .card:hover .card-thumb img {
            transform: scale(1.03);
            opacity: 1;
        }

        /* Placeholder (no video yet) */
        .card-thumb .ph {
            width: 100%;
            height: 100%;
            background: #0e0e0e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ph-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.4;
        }

        /* Play overlay on hover */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(10,10,10,0.5);
        }
        .card:hover .play-overlay { opacity: 1; }

        .play-icon {
            width: 44px; height: 44px;
            border: 1px solid rgba(232,228,222,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-icon svg { width: 16px; height: 16px; fill: var(--text); margin-left: 3px; }

        /* Card label */
        .card-label {
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-top: 1px solid var(--border);
        }
        .card-title {
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            color: var(--text);
            font-weight: 400;
        }
        .card-year {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        /* ── FOOTER ── */
        footer {
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }
        footer a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        footer a:hover { color: var(--text); }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            header { padding: 1.25rem 1rem; }
            .grid { grid-template-columns: 1fr; }
            footer { padding: 1rem; flex-direction: column; gap: 0.5rem; text-align: center; }
        }
        @media (min-width: 641px) and (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
