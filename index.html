<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoav Shtibelman</title>
    <meta name="description" content="AI Video Creator">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --text: #e8e4de;
            --muted: #4a4a4a;
            --border: #1a1a1a;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: start;
            border-bottom: 1px solid var(--border);
        }

        .site-name {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        .header-center { text-align: center; }

        .header-center-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }

        .header-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .header-links a {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .header-links a:hover { color: var(--text); }

        .header-right { text-align: right; }

        .site-role {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            font-style: italic;
        }

        /* PAGE WRAP */
        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .card {
            position: relative;
            background: var(--bg);
            overflow: hidden;
            cursor: pointer;
        }

        .card-thumb {
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            background: #111;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease, opacity 0.3s;
            opacity: 0.8;
        }
        .card:hover .card-thumb img { transform: scale(1.03); opacity: 1; }

        .card-thumb .ph {
            width: 100%;
            height: 100%;
            background: #0e0e0e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ph-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.4;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(10,10,10,0.5);
        }
        .card:hover .play-overlay { opacity: 1; }

        .play-icon {
            width: 44px; height: 44px;
            border: 1px solid rgba(232,228,222,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-icon svg { width: 16px; height: 16px; fill: var(--text); margin-left: 3px; }

        .card-label {
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-top: 1px solid var(--border);
        }
        .card-title { font-size: 0.72rem; letter-spacing: 0.05em; color: var(--text); font-weight: 400; }
        .card-year { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }

        .lightbox-inner {
            width: 90vw;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            position: relative;
        }
        .lightbox-inner iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .lightbox-close {
            position: absolute;
            top: -2.2rem;
            right: 0;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s;
        }
        .lightbox-close:hover { color: var(--text); }

        /* FOOTER */
        footer {
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }
        footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--text); }

        /* MOBILE */
        @media (max-width: 640px) {
            header { grid-template-columns: 1fr; gap: 0.75rem; padding: 1.25rem 1rem; }
            .header-center, .header-right { text-align: left; }
            .header-links { justify-content: flex-start; }
            .grid { grid-template-columns: 1fr; }
            footer { padding: 1rem; flex-direction: column; gap: 0.5rem; text-align: center; }
        }
        @media (min-width: 641px) and (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<script>
    var lightbox = document.getElementById('lightbox');
    var iframe = document.getElementById('lightbox-iframe');
    var closeBtn = document.getElementById('lightbox-close');

    document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function() {
            var vid = card.dataset.video;
            if (!vid) return;
            iframe.src = 'https://www.youtube.com/embed/' + vid + '?autoplay=1';
            lightbox.classList.add('open');
        });
    });

    function closeLightbox() {
        lightbox.classList.remove('open');
        iframe.src = '';
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
</script>
